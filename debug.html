<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GTA2 data debug viewer</title>
    <style>
      body { background: #111; color: #ccc; font-family: monospace; padding: 16px; }
      h2 { color: #ffd700; margin: 24px 0 8px; }
      canvas { border: 1px solid #333; image-rendering: pixelated; display: block; }
      #status { color: #6f6; white-space: pre; }
    </style>
  </head>
  <body>
    <div id="status">loading…</div>
    <h2>Tiles 0–255</h2>
    <canvas id="tiles"></canvas>
    <h2>Car sprites (first 40)</h2>
    <canvas id="cars"></canvas>
    <h2>Ped sprites (first 40)</h2>
    <canvas id="peds"></canvas>
    <h2>Map lids around centre (2D, top level)</h2>
    <canvas id="map"></canvas>
    <script type="module" src="/src/debug/main.ts"></script>
  </body>
</html>
